services:
  remnawave-subscription-page:
    container_name: remnawave-subscription-page
    hostname: remnawave-subscription-page
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '127.0.0.1:3010:3010'
    networks:
      - remnawave-network

networks:
  remnawave-network:
    driver: bridge
    external: true
